site_name: Mac Mini M4 — Cuartel General
site_description: Documentación de proyectos y empresas desplegadas en el Mac Mini M4
site_author: MacMiniDoc
site_url: https://molero86.github.io/MacMiniDoc/

repo_name: molero86/MacMiniDoc
repo_url: https://github.com/molero86/MacMiniDoc

theme:
  name: material
  language: es
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: es

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Inicio: index.md
  - Servidor:
      - Hardware: servidor/hardware.md
      - Red y servicios: servidor/red.md
  - Empresas:
      - Vista general: empresas/index.md
      - El Alambique:
          - Descripción: empresas/el-alambique/index.md
          - Agentes IA: empresas/el-alambique/agentes.md
          - Base de datos: empresas/el-alambique/bbdd.md
          - Fuentes: empresas/el-alambique/fuentes.md
          - Proyectos: empresas/el-alambique/proyectos/index.md
      - Domus Gestión:
          - Descripción: empresas/domus-gestion/index.md
          - Agentes IA: empresas/domus-gestion/agentes.md
          - Proyectos: empresas/domus-gestion/proyectos/index.md
      - Argos Capital:
          - Descripción: empresas/argos-capital/index.md
          - Agentes IA: empresas/argos-capital/agentes.md
          - Proyectos: empresas/argos-capital/proyectos/index.md
      - Forja Digital:
          - Descripción: empresas/forja-digital/index.md
          - Agentes IA: empresas/forja-digital/agentes.md
          - Modelo operativo: empresas/forja-digital/modelo-operativo.md
          - Gobierno y KPIs: empresas/forja-digital/gobierno-kpis.md
          - Proyectos: empresas/forja-digital/proyectos/index.md

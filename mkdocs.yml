site_name: Mac Mini M4 — Cuartel General
site_description: Documentación de proyectos y empresas desplegadas en el Mac Mini M4
site_author: MacMiniDoc
site_url: https://tu-usuario.github.io/MacMiniDoc/

repo_name: tu-usuario/MacMiniDoc
repo_url: https://github.com/tu-usuario/MacMiniDoc

theme:
  name: material
  language: es
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: es

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Inicio: index.md
  - Servidor:
      - Hardware: servidor/hardware.md
      - Red y servicios: servidor/red.md
  - Empresas:
      - Vista general: empresas/index.md
      - Noticias Claras:
          - Descripción: empresas/noticias-claras/index.md
          - Agentes IA: empresas/noticias-claras/agentes.md
          - Proyectos: empresas/noticias-claras/proyectos/index.md
      - Casa Inteligente:
          - Descripción: empresas/casa-inteligente/index.md
          - Agentes IA: empresas/casa-inteligente/agentes.md
          - Proyectos: empresas/casa-inteligente/proyectos/index.md
